        /* ===== LANDING PAGE (Google-style) ===== */
        #landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: opacity 0.4s, transform 0.4s;
        }
        #landing.hide {

            transform: translateY(-30px);
            pointer-events: none;
        }
        .logo {
            margin-bottom: 40px;
            text-align: center;
            user-select: none;
        }
        .logo-text {
            font-size: 3em;
            font-weight: 500;
            color: #fff;
            letter-spacing: -1px;
        }
        .logo-text span { font-weight: 300; color: #4a9eff; }
        .logo-text img { height: 35px; }

        /* Search bar */
        .search-bar {
            width: 100%;
            max-width: 620px;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            padding: 18px 56px 18px 24px;
            border-radius: 28px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1.05em;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-bar input:focus {
            border-color: #4a9eff;
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.12);
        }
        .search-bar input::placeholder { color: #555; }
        .search-bar button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #4a9eff;
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
            padding: 0;
        }
        .search-bar button:hover { background: #3a8eef; transform: translateY(-50%) scale(1.05); }
        .search-bar button:disabled { opacity: 0.4; cursor: not-allowed; transform: translateY(-50%); }
        .search-bar .spinner {
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .landing-hint {
            margin-top: 24px;
            color: #444;
            font-size: 0.82em;
            text-align: center;
        }
        .landing-hint kbd {
            background: #222;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: inherit;
            color: #666;
        }

        /* Error toast on landing */
        .landing-error {
            margin-top: 16px;
            color: #f87171;
            font-size: 0.88em;
            text-align: center;
            max-width: 500px;
            min-height: 1.2em;
        }

        /* ===== RESULTS PAGE ===== */
        #results {
            height: 100vh;
            max-height: 100vh;
            display: none;
            opacity: 0;
            transition: opacity 0.4s;
            padding: 0 20px 40px;
        }
        #results.show {

            background: #4a9eff;
            color: #fff;
            font-weight: 600;
            cursor: pointer;

    <script>
    // State
    let mediaItems = [];
    let albumTitle = '';
    let zipBlob = null;
    let cancelled = false;
    let downloading = false;
    let downloadedCount = 0;
    let errorCount = 0;

    const ARROW_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

    // Proxy list - tried in order until one works
    const PROXIES = [
        { name: 'direct',      build: (url) => url },
        { name: 'AllOrigins',   build: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
        { name: 'corsproxy.io', build: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}` },
    ];
    let workingProxyPage = null;
    let workingProxyMedia = null;

    async function fetchWithAutoProxy(url, knownProxy) {
        const order = knownProxy
            ? [knownProxy, ...PROXIES.filter(p => p !== knownProxy)]
            : PROXIES;
        for (const proxy of order) {
            try {
                const proxied = proxy.build(url);
                const response = await fetch(proxied);
                if (response.ok) return { response, proxy };
            } catch (_) {}
        }
        throw new Error('Tous les proxies ont echoue');
    }

    // Navigation
    function goHome() {
        if (downloading) return;
        document.getElementById('results').classList.remove('show');
        setTimeout(() => {
            document.getElementById('results').style.display = 'none';
            document.getElementById('landing').style.display = 'flex';
            requestAnimationFrame(() => document.getElementById('landing').classList.remove('hide'));
            document.getElementById('url-input').focus();
        }, 300);
    }

    function showResults() {
        document.getElementById('landing').classList.add('hide');
        setTimeout(() => {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            requestAnimationFrame(() => document.getElementById('results').classList.add('show'));
        }, 350);
    }

    // Logging
    function log(msg, type = 'info') {
        const logEl = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] ${msg}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
        document.getElementById('log-container').style.display = 'block';
        setHeightOfLogBox();
    }

    let logVisible = true;
    function toggleLog() {
        logVisible = !logVisible;
        document.getElementById('log').style.display = logVisible ? 'block' : 'none';
        document.getElementById('log-arrow').classList.toggle('collapsed', !logVisible);
    }

    // Parse HTML
    function parseHTML(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        const titleEl = doc.querySelector('h1.album-title') || doc.querySelector('title');
        albumTitle = titleEl ? titleEl.textContent.trim() : 'Fotoshare_Album';
        albumTitle = albumTitle.replace(/[<>:"\/\\|?*]/g, '_').trim();

        const thumbs = doc.querySelectorAll('div.thumb[data-thumb]');
        mediaItems = [];

        thumbs.forEach((thumb) => {
            const type = thumb.getAttribute('data-type') || thumb.getAttribute('data-fileType') || 'jpg';
            const thumbUrl = thumb.getAttribute('data-thumb').replace(/&amp;/g, '&');
            const urlBase = thumbUrl.split('?')[0];
            const fullUrl = type === 'mp4' ? urlBase.replace(/_thumb\.jpg$/, '.mp4') : urlBase;

            mediaItems.push({ type, fullUrl, filename: fullUrl.split('/').pop() });
        });

        return mediaItems.length > 0;
    }

    function showParsedResults() {
        const photos = mediaItems.filter(m => m.type !== 'mp4').length;
        const videos = mediaItems.filter(m => m.type === 'mp4').length;

        document.getElementById('album-title').textContent = albumTitle;
        document.getElementById('album-meta').textContent = `${photos} photos, ${videos} videos`;
        document.getElementById('stat-photos').textContent = photos;
        document.getElementById('stat-videos').textContent = videos;
        document.getElementById('stat-total').textContent = mediaItems.length;
        document.getElementById('stat-downloaded').textContent = '0';
        document.getElementById('stat-errors').textContent = '0';
        document.getElementById('btn-start').style.display = 'inline-block';
        document.getElementById('btn-start').disabled = false;
        document.getElementById('download-section').style.display = 'none';
        document.getElementById('progress-label').textContent = 'Pret a telecharger';
        document.getElementById('progress-percent').textContent = '0%';
        document.getElementById('progress-bar').style.width = '0%';
        document.getElementById('progress-bar').style.background = 'linear-gradient(90deg, #4a9eff, #7b61ff)';

        // Clear old logs
        document.getElementById('log').innerHTML = '';
        document.getElementById('log-container').style.display = 'none';

        log(`Album: "${albumTitle}"`, 'info');
        log(`${photos} photos et ${videos} videos detectees`, 'success');

        showResults();
    }

    // Fetch from landing
    async function fetchFromUrl() {
        const url = document.getElementById('url-input').value.trim();
        if (!url) return;
        await doFetch(url, 'landing');
    }

    // Fetch from mini bar
    function fetchFromMini() {
        const url = document.getElementById('url-input-mini').value.trim();
        if (!url) return;
        doFetch(url, 'mini');
    }

    async function doFetch(url, source) {
        const errorEl = document.getElementById('landing-error');
        const btn = document.getElementById('btn-fetch');

        if (source === 'landing') {
            errorEl.textContent = '';
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;
        }

        try {
            const { response, proxy } = await fetchWithAutoProxy(url, workingProxyPage);
            workingProxyPage = proxy;
            const html = await response.text();

            if (parseHTML(html)) {
                document.getElementById('url-input-mini').value = url;
                showParsedResults();
            } else {
                const msg = 'Aucun media trouve. Verifiez l\'URL.';
                if (source === 'landing') errorEl.textContent = msg;
                else log(msg, 'error');
            }
        } catch (err) {
            const msg = `Impossible de recuperer la page: ${err.message}`;
            if (source === 'landing') errorEl.textContent = msg;
            else log(msg, 'error');
        } finally {
            if (source === 'landing') {
                btn.innerHTML = ARROW_SVG;
                btn.disabled = false;
            }
        }
    }

    async function downloadFile(item, retries = 2) {
        for (let attempt = 0; attempt <= retries; attempt++) {
            try {
                if (cancelled) return null;
                const { response, proxy } = await fetchWithAutoProxy(item.fullUrl, workingProxyMedia);
                workingProxyMedia = proxy;
                return await response.blob();
            } catch (err) {
                if (attempt < retries) {
                    log(`Retry ${attempt + 1}/${retries} pour ${item.filename}: ${err.message}`, 'warn');
                    await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
                } else throw err;
            }
        }
    }

    function updateProgress() {
        const total = mediaItems.length;
        const done = downloadedCount + errorCount;
        const pct = Math.round((done / total) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-percent').textContent = pct + '%';
        document.getElementById('stat-downloaded').textContent = downloadedCount;
        document.getElementById('stat-errors').textContent = errorCount;
        document.getElementById('progress-label').textContent =
            `${done}/${total} traites (${downloadedCount} OK, ${errorCount} erreurs)`;
    }

    async function startDownload() {
        if (downloading) return;
        downloading = true;
        cancelled = false;
        downloadedCount = 0;
        errorCount = 0;

        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-cancel').style.display = 'inline-block';
        document.getElementById('download-section').style.display = 'none';

        log('Debut du telechargement...', 'info');

        const zip = new JSZip();
        const folder = zip.folder(albumTitle);
        const CONCURRENT = 4;
        let queue = [...mediaItems];
        let active = 0;

        await new Promise((resolve) => {
            function processNext() {
                if (cancelled) { if (active === 0) resolve(); return; }
                while (active < CONCURRENT && queue.length > 0) {
                    const item = queue.shift();
                    active++;
                    (async () => {
                        try {
                            const blob = await downloadFile(item);
                            if (blob && !cancelled) {
                                folder.file(item.filename, blob);
                                downloadedCount++;
                                log(`OK: ${item.filename} (${formatSize(blob.size)})`, 'success');
                            }
                        } catch (err) {
                            errorCount++;
                            log(`ERREUR: ${item.filename} - ${err.message}`, 'error');
                        } finally {
                            active--;
                            updateProgress();
                            if (queue.length > 0) processNext();
                            else if (active === 0) resolve();
                        }
                    })();
                }
            }
            processNext();
        });

        if (cancelled) {
            log('Telechargement annule.', 'warn');
            downloading = false;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-cancel').style.display = 'none';
            return;
        }

        log('Creation du ZIP...', 'info');
        document.getElementById('progress-label').textContent = 'Generation du ZIP...';

        try {
            zipBlob = await zip.generateAsync(
                { type: 'blob', compression: 'STORE' },
                (metadata) => {
                    document.getElementById('progress-label').textContent =
                        `Generation du ZIP: ${Math.round(metadata.percent)}%`;
                }
            );
            log(`ZIP cree: ${formatSize(zipBlob.size)}`, 'success');
            document.getElementById('zip-size').textContent =
                `${formatSize(zipBlob.size)} - ${downloadedCount} fichiers`;
            document.getElementById('download-section').style.display = 'block';
            document.getElementById('progress-label').textContent = 'Termine !';
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('progress-bar').style.background =
                'linear-gradient(90deg, #22c55e, #4ade80)';
        } catch (err) {
            log(`Erreur ZIP: ${err.message}`, 'error');
        }

        downloading = false;
        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-cancel').style.display = 'none';
    }

    function cancelDownload() {
        cancelled = true;
        log('Annulation en cours...', 'warn');
    }

    function saveZip() {
        if (zipBlob) {
            saveAs(zipBlob, `${albumTitle}.zip`);
            log(`ZIP lance: ${albumTitle}.zip`, 'success');
        }
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    function getHeight(elm) {
        let style = window.getComputedStyle(elm);
        let totalHeight = 0;
        totalHeight += parseFloat(style.height);
        // totalHeight += parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
        totalHeight += parseFloat(style.borderTopWidth) + parseFloat(style.borderBottomWidth);
        totalHeight += parseFloat(style.marginTop) + parseFloat(style.marginBottom);
        return totalHeight;
    }

    function setHeightOfLogBox() {
        const l = document.getElementById("log");
        const h = getHeight(document.getElementById("results")) - getHeight(l);
        console.log(h);
        l.style.maxHeight = `calc(100vh - ${h}px)`;
    }

    // Keyboard
    document.getElementById('url-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') fetchFromUrl();
    });
    document.getElementById('url-input-mini').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') fetchFromMini();
    });
    </script>
</body>
