<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FotoShare Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .input-section {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }
        .input-section h2 {
            font-size: 1em;
            margin-bottom: 12px;
            color: #ccc;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #4a9eff; }
        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #4a9eff;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.2s, opacity 0.2s;
            white-space: nowrap;
        }
        button:hover { background: #3a8eef; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .divider {
            text-align: center;
            color: #555;
            margin: 16px 0;
            font-size: 0.85em;
        }
        .file-input-wrapper {
            position: relative;
        }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px dashed #333;
            background: #111;
            color: #aaa;
            cursor: pointer;
        }
        input[type="file"]:hover { border-color: #4a9eff; }

        /* Status panel */
        #status-panel {
            display: none;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }
        .album-title-display {
            font-size: 1.3em;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            text-align: center;
        }
        .stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: #222;
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }
        .stat-box .number {
            font-size: 1.5em;
            font-weight: 700;
            color: #4a9eff;
        }
        .stat-box .label {
            font-size: 0.75em;
            color: #888;
            margin-top: 2px;
        }

        /* Progress */
        .progress-container {
            margin-bottom: 16px;
        }
        .progress-bar-bg {
            height: 8px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #7b61ff);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #888;
            margin-top: 6px;
        }

        /* Log */
        #log-container {
            display: none;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }
        #log-container h3 {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
        }
        #log {
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.8em;
            line-height: 1.6;
        }
        #log::-webkit-scrollbar { width: 6px; }
        #log::-webkit-scrollbar-track { background: transparent; }
        #log::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .log-entry { padding: 2px 0; }
        .log-success { color: #4ade80; }
        .log-error { color: #f87171; }
        .log-info { color: #60a5fa; }
        .log-warn { color: #fbbf24; }

        /* Download section */
        #download-section {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        #download-section button {
            background: #22c55e;
            font-size: 1.1em;
            padding: 16px 40px;
            border-radius: 10px;
        }
        #download-section button:hover { background: #16a34a; }
        .zip-size {
            color: #888;
            font-size: 0.85em;
            margin-top: 8px;
        }

        /* Actions row */
        .actions-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }
        .btn-cancel {
            background: #dc2626;
        }
        .btn-cancel:hover { background: #b91c1c; }

    </style>
</head>
<body>
    <div class="container">
        <h1>FotoShare Downloader</h1>
        <p class="subtitle">Telechargez toutes les photos et videos d'un album FotoShare en ZIP</p>

        <div class="input-section">
            <h2>Entrer l'URL de l'album</h2>
            <div class="input-row">
                <input type="text" id="url-input" placeholder="https://fotoshare.co/a/1234567">
                <button id="btn-fetch" onclick="fetchFromUrl()">Analyser</button>
            </div>
        </div>

        <div id="status-panel">
            <div class="album-title-display" id="album-title"></div>
            <div class="stats">
                <div class="stat-box">
                    <div class="number" id="stat-photos">0</div>
                    <div class="label">Photos</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-videos">0</div>
                    <div class="label">Videos</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-total">0</div>
                    <div class="label">Total</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-downloaded">0</div>
                    <div class="label">Telecharges</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-errors">0</div>
                    <div class="label">Erreurs</div>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
                <div class="progress-text">
                    <span id="progress-label">En attente...</span>
                    <span id="progress-percent">0%</span>
                </div>
            </div>

            <div class="actions-row">
                <button id="btn-start" onclick="startDownload()">Telecharger tout</button>
                <button id="btn-cancel" class="btn-cancel" style="display:none" onclick="cancelDownload()">Annuler</button>
            </div>

            <div id="download-section">
                <button onclick="saveZip()">Telecharger le ZIP</button>
                <div class="zip-size" id="zip-size"></div>
            </div>
        </div>

        <div id="log-container">
            <h3 onclick="toggleLog()">Journal des operations (cliquer pour reduire/agrandir)</h3>
            <div id="log"></div>
        </div>
    </div>

    <script>
    // State
    let mediaItems = [];
    let albumTitle = '';
    let zipBlob = null;
    let cancelled = false;
    let downloading = false;
    let downloadedCount = 0;
    let errorCount = 0;

    // Proxy list - tried in order until one works
    const PROXIES = [
        { name: 'direct',      build: (url) => url },
        { name: 'AllOrigins',   build: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
        { name: 'corsproxy.io', build: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}` },
    ];
    // Once a proxy works for a given purpose, remember it
    let workingProxyPage = null;
    let workingProxyMedia = null;

    // Try fetching a URL through all proxies, return { response, proxy }
    async function fetchWithAutoProxy(url, knownProxy) {
        // If we already found a working proxy, try it first
        const order = knownProxy
            ? [knownProxy, ...PROXIES.filter(p => p !== knownProxy)]
            : PROXIES;

        for (const proxy of order) {
            try {
                const proxied = proxy.build(url);
                const response = await fetch(proxied);
                if (response.ok) return { response, proxy };
            } catch (_) { /* try next */ }
        }
        throw new Error('Tous les proxies ont echoue');
    }

    // Logging
    function log(msg, type = 'info') {
        const logEl = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] ${msg}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
        document.getElementById('log-container').style.display = 'block';
    }

    let logVisible = true;
    function toggleLog() {
        logVisible = !logVisible;
        document.getElementById('log').style.display = logVisible ? 'block' : 'none';
    }

    // Parse HTML to extract media items
    function parseHTML(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Get title
        const titleEl = doc.querySelector('h1.album-title') || doc.querySelector('title');
        albumTitle = titleEl ? titleEl.textContent.trim() : 'FotoShare_Album';
        // Sanitize folder name
        albumTitle = albumTitle.replace(/[<>:"\/\\|?*]/g, '_').trim();

        // Get all thumb divs
        const thumbs = doc.querySelectorAll('div.thumb[data-thumb]');
        mediaItems = [];

        thumbs.forEach((thumb, index) => {
            const type = thumb.getAttribute('data-type') || thumb.getAttribute('data-fileType') || 'jpg';
            const thumbUrl = thumb.getAttribute('data-thumb').replace(/&amp;/g, '&');
            const hash = thumb.getAttribute('data-hash') || `item_${index}`;

            let fullUrl;
            let filename;

            if (type === 'mp4') {
                // Video: thumb is like .../filename_thumb.jpg?..., video is .../filename.mp4
                const urlBase = thumbUrl.split('?')[0]; // remove query params
                fullUrl = urlBase.replace(/_thumb\.jpg$/, '.mp4');
                filename = fullUrl.split('/').pop();
            } else {
                // Photo: thumb is like .../filename.jpg?width=450&..., full size = no query params
                fullUrl = thumbUrl.split('?')[0];
                filename = fullUrl.split('/').pop();
            }

            mediaItems.push({
                index: index + 1,
                type,
                hash,
                thumbUrl,
                fullUrl,
                filename,
                status: 'pending'
            });
        });

        return mediaItems.length > 0;
    }

    // Display parsed results
    function showParsedResults() {
        const photos = mediaItems.filter(m => m.type !== 'mp4').length;
        const videos = mediaItems.filter(m => m.type === 'mp4').length;

        document.getElementById('album-title').textContent = albumTitle;
        document.getElementById('stat-photos').textContent = photos;
        document.getElementById('stat-videos').textContent = videos;
        document.getElementById('stat-total').textContent = mediaItems.length;
        document.getElementById('stat-downloaded').textContent = '0';
        document.getElementById('stat-errors').textContent = '0';
        document.getElementById('status-panel').style.display = 'block';
        document.getElementById('btn-start').style.display = 'inline-block';
        document.getElementById('btn-start').disabled = false;
        document.getElementById('download-section').style.display = 'none';
        document.getElementById('progress-label').textContent = 'Pret a telecharger';
        document.getElementById('progress-percent').textContent = '0%';
        document.getElementById('progress-bar').style.width = '0%';

        log(`Album: "${albumTitle}"`, 'info');
        log(`${photos} photos et ${videos} videos detectees (${mediaItems.length} fichiers au total)`, 'success');
    }

    // Fetch from URL
    async function fetchFromUrl() {
        const url = document.getElementById('url-input').value.trim();
        if (!url) return;

        const btn = document.getElementById('btn-fetch');
        btn.disabled = true;
        btn.textContent = 'Chargement...';
        log(`Recuperation de la page: ${url}`, 'info');

        try {
            const { response, proxy } = await fetchWithAutoProxy(url, workingProxyPage);
            workingProxyPage = proxy;
            log(`Page recuperee via ${proxy.name}`, 'info');
            const html = await response.text();

            if (parseHTML(html)) {
                showParsedResults();
            } else {
                log('Aucun media trouve dans la page. Verifiez l\'URL.', 'error');
            }
        } catch (err) {
            log(`Erreur: ${err.message}`, 'error');
            log('Chargez le fichier HTML manuellement via l\'option 2.', 'warn');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Analyser';
        }
    }

    async function downloadFile(item, retries = 2) {
        for (let attempt = 0; attempt <= retries; attempt++) {
            try {
                if (cancelled) return null;
                const { response, proxy } = await fetchWithAutoProxy(item.fullUrl, workingProxyMedia);
                workingProxyMedia = proxy;
                const blob = await response.blob();
                return blob;
            } catch (err) {
                if (attempt < retries) {
                    log(`Retry ${attempt + 1}/${retries} pour ${item.filename}: ${err.message}`, 'warn');
                    await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
                } else {
                    throw err;
                }
            }
        }
    }

    // Update progress
    function updateProgress() {
        const total = mediaItems.length;
        const done = downloadedCount + errorCount;
        const pct = Math.round((done / total) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-percent').textContent = pct + '%';
        document.getElementById('stat-downloaded').textContent = downloadedCount;
        document.getElementById('stat-errors').textContent = errorCount;
        document.getElementById('progress-label').textContent =
            `${done}/${total} traites (${downloadedCount} OK, ${errorCount} erreurs)`;
    }

    // Start download
    async function startDownload() {
        if (downloading) return;
        downloading = true;
        cancelled = false;
        downloadedCount = 0;
        errorCount = 0;

        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-cancel').style.display = 'inline-block';
        document.getElementById('download-section').style.display = 'none';

        log('Debut du telechargement...', 'info');

        const zip = new JSZip();
        const folder = zip.folder(albumTitle);

        const CONCURRENT = 4;
        let queue = [...mediaItems];
        let active = 0;

        await new Promise((resolve) => {
            function processNext() {
                if (cancelled) {
                    if (active === 0) resolve();
                    return;
                }
                while (active < CONCURRENT && queue.length > 0) {
                    const item = queue.shift();
                    active++;
                    (async () => {
                        try {
                            const blob = await downloadFile(item);
                            if (blob && !cancelled) {
                                folder.file(item.filename, blob);
                                downloadedCount++;
                                log(`OK: ${item.filename} (${formatSize(blob.size)})`, 'success');
                            }
                        } catch (err) {
                            errorCount++;
                            log(`ERREUR: ${item.filename} - ${err.message}`, 'error');
                        } finally {
                            active--;
                            updateProgress();
                            if (queue.length > 0) {
                                processNext();
                            } else if (active === 0) {
                                resolve();
                            }
                        }
                    })();
                }
            }
            processNext();
        });

        if (cancelled) {
            log('Telechargement annule par l\'utilisateur.', 'warn');
            downloading = false;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-cancel').style.display = 'none';
            return;
        }

        log('Creation du fichier ZIP en cours...', 'info');
        document.getElementById('progress-label').textContent = 'Generation du ZIP...';

        try {
            zipBlob = await zip.generateAsync(
                { type: 'blob', compression: 'STORE' },
                (metadata) => {
                    const pct = Math.round(metadata.percent);
                    document.getElementById('progress-label').textContent =
                        `Generation du ZIP: ${pct}%`;
                }
            );

            log(`ZIP cree: ${formatSize(zipBlob.size)}`, 'success');
            document.getElementById('zip-size').textContent =
                `Taille: ${formatSize(zipBlob.size)} | ${downloadedCount} fichiers`;
            document.getElementById('download-section').style.display = 'block';
            document.getElementById('progress-label').textContent = 'Termine !';
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('progress-bar').style.background =
                'linear-gradient(90deg, #22c55e, #4ade80)';
        } catch (err) {
            log(`Erreur lors de la creation du ZIP: ${err.message}`, 'error');
        }

        downloading = false;
        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-cancel').style.display = 'none';
    }

    function cancelDownload() {
        cancelled = true;
        log('Annulation en cours...', 'warn');
    }

    function saveZip() {
        if (zipBlob) {
            saveAs(zipBlob, `${albumTitle}.zip`);
            log(`Telechargement du ZIP lance: ${albumTitle}.zip`, 'success');
        }
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    // Enter key on URL input
    document.getElementById('url-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') fetchFromUrl();
    });
    </script>
</body>
</html>
